<!-- 🔥 UPLOAD DE IMAGENS -->
<label>Selecionar imagens:</label><br>
<input type="file" id="imagens" multiple accept="image/*"><br><br>

<button onclick="salvar()">Cadastrar</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js";

// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyBL_4orwlOIhGsggtVrZHS49JNhFTE0HMo",
  authDomain: "imobiliaria-site-d0849.firebaseapp.com",
  projectId: "imobiliaria-site-d0849",
  storageBucket: "imobiliaria-site-d0849.appspot.com"
};

// INICIAR
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

// PROTEGER PÁGINA
onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "login.html";
  }
});

// SALVAR
window.salvar = async function() {

  const files = document.getElementById("imagens").files;
  let urls = [];

  // 🔥 UPLOAD DAS IMAGENS
  for (let i = 0; i < files.length; i++) {

    const file = files[i];
    const storageRef = ref(storage, "imoveis/" + Date.now() + "_" + file.name);

    await uploadBytes(storageRef, file);
    const url = await getDownloadURL(storageRef);

    urls.push(url);
  }

  // 🔥 PEGAR CARACTERÍSTICAS
  const checkboxes = document.querySelectorAll('input[type="checkbox"]:checked');
  const caracteristicas = [];

  checkboxes.forEach(cb => {
    caracteristicas.push(cb.value);
  });

  // 🔥 SALVAR NO FIRESTORE
  await setDoc(doc(db, "imoveis", document.getElementById("idImovel").value), {
    id: document.getElementById("idImovel").value, // ✅ ID PERSONALIZADO
    titulo: document.getElementById("titulo").value,
    cidade: document.getElementById("cidade").value,
    regiao: document.getElementById("regiao").value.toLowerCase(),
    tipo: document.getElementById("tipo").value.toLowerCase(),
    status: document.getElementById("status").value.toLowerCase(),
    preco: Number(document.getElementById("preco").value),
    dorms: Number(document.getElementById("dorms").value),
    vaga: Number(document.getElementById("vaga").value),
    area: Number(document.getElementById("area").value),
    descricao: document.getElementById("descricao").value,
    imagens: urls,
    caracteristicas: caracteristicas
  });

  alert("Imóvel cadastrado!");

}

</script>

</script>
