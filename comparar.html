<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <title>Comparar Imóveis</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f5f7fa;
      font-family: Arial, sans-serif;
    }

    h1 {
      text-align: center;
      margin: 30px 0;
    }

    .tabela-comparacao {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 5px 25px rgba(0,0,0,0.1);
    }

    table {
      width: 100%;
      text-align: center;
      min-width: 700px;
    }

    th {
      background: #f8f9fa;
      padding: 20px;
      position: sticky;
      top: 0;
      z-index: 2;
    }

    th img {
      width: 140px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    td {
      padding: 12px;
      border-top: 1px solid #eee;
    }

    td:first-child {
      font-weight: bold;
      text-align: left;
      background: #fafafa;
    }

    .check {
      color: green;
      font-size: 18px;
    }

    .no-check {
      color: red;
      font-size: 18px;
    }

    .btn-remover {
      margin-top: 10px;
      padding: 6px 12px;
      border: none;
      border-radius: 20px;
      background: #dc3545;
      color: white;
      font-size: 13px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn-remover:hover {
      background: #a71d2a;
      transform: scale(1.05);
    }

    .btn-voltar {
      display: block;
      margin: 10px auto 30px;
      padding: 10px 20px;
      border-radius: 30px;
      background: #0d6efd;
      color: white;
      border: none;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn-voltar:hover {
      background: #084298;
    }

    .vazio {
      text-align: center;
      margin-top: 80px;
      color: #777;
    }
  </style>
</head>

<body>

<h1>Comparar Imóveis</h1>

<button class="btn-voltar" onclick="window.history.back()">← Voltar</button>

<div class="container">

  <div id="vazio" class="vazio" style="display:none;">
    <h4>Nenhum imóvel para comparar 😢</h4>
    <p>Volte e adicione imóveis</p>
  </div>

  <div id="tabela-container" class="tabela-comparacao table-responsive">
    <table>
      <thead>
        <tr id="topo"></tr>
      </thead>
      <tbody id="tabela"></tbody>
    </table>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

// CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyBL_4orwlOIhGsggtVrZHS49JNhFTE0HMo",
  authDomain: "imobiliaria-site-d0849.firebaseapp.com",
  projectId: "imobiliaria-site-d0849",
  storageBucket: "imobiliaria-site-d0849.appspot.com"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// PEGAR IDs
let ids = JSON.parse(localStorage.getItem("comparar")) || [];

// REMOVER
function remover(id) {
  ids = ids.filter(item => item !== id);
  localStorage.setItem("comparar", JSON.stringify(ids));
  location.reload();
}

window.remover = remover;

// CARREGAR
async function carregar() {

  if (ids.length === 0) {
    document.getElementById("vazio").style.display = "block";
    document.getElementById("tabela-container").style.display = "none";
    return;
  }

  const snapshot = await getDocs(collection(db, "imoveis"));

  let selecionados = [];

  snapshot.forEach(doc => {
    if (ids.includes(doc.id)) {
      selecionados.push({ id: doc.id, ...doc.data() });
    }
  });

  const topo = document.getElementById("topo");
  topo.innerHTML = "<th></th>";

  selecionados.forEach(imovel => {
    topo.innerHTML += `
      <th>
        <img src="${imovel.imagens[0]}"><br>
        ${imovel.titulo}
        <br>
        <button class="btn-remover" onclick="remover('${imovel.id}')">
          ❌ Remover
        </button>
      </th>
    `;
  });

  const tabela = document.getElementById("tabela");
  tabela.innerHTML = "";

  const campos = [
    { nome: "Cidade", chave: "cidade" },
    { nome: "Tipo", chave: "tipo" },
    { nome: "Quartos", chave: "dorms" },
    { nome: "Vagas", chave: "vaga" },
    { nome: "Área (m²)", chave: "area" },
    { nome: "Preço", chave: "preco" }
  ];

  campos.forEach(campo => {
    let linha = `<tr><td>${campo.nome}</td>`;

    selecionados.forEach(imovel => {

      if (campo.chave === "preco") {
        linha += `<td>R$ ${Number(imovel.preco).toLocaleString("pt-BR")}</td>`;
      } else {
        linha += `<td>${imovel[campo.chave] || "-"}</td>`;
      }

    });

    linha += "</tr>";
    tabela.innerHTML += linha;
  });

  const caracteristicasLista = [
    "Academia","Piscina","Churrasqueira","Playground","Salão de Festas",
    "Sauna","Coworking","Pet Place","Quadra","Cinema"
  ];

  caracteristicasLista.forEach(item => {
    let linha = `<tr><td>${item}</td>`;

    selecionados.forEach(imovel => {
      const tem = imovel.caracteristicas?.includes(item);

      linha += `<td>
        ${tem ? '<span class="check">✔</span>' : '<span class="no-check">✖</span>'}
      </td>`;
    });

    linha += "</tr>";
    tabela.innerHTML += linha;
  });

}

carregar();

</script>

</body>
</html>
